<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina AI</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
</head>

<body>

<div class="background"></div>

<div class="app">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-circle">
                🤖
            </div>

            <h2>Sina AI</h2>

            <p>Your Persian AI Assistant</p>

        </div>

        <button id="newChat">
            ➕ چت جدید
        </button>

        <div id="history" class="history">

            <div class="history-item active">
                💬 گفتگوی جدید
            </div>

        </div>

        <div class="profile">

            <div class="avatar-user">
                👤
            </div>

            <div>

                <b>Sina</b>

                <small>Online</small>

            </div>

        </div>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="header">

            <div class="header-left">

                <div class="ai-logo">
                    🤖
                </div>

                <div>

                    <h2>Sina AI</h2>

                    <p class="status">
                        🟢 آنلاین
                    </p>

                </div>

            </div>

            <div class="header-right">

                <button id="theme" title="تم">
                    🌙
                </button>

                <button id="settings" title="تنظیمات">
                    ⚙️
                </button>

                <button id="profileBtn" title="پروفایل">
                    👤
                </button>

            </div>

        </header>

        <!-- Chat -->

        <section id="chatBox" class="chatBox">

            <div class="welcome">

                <div class="welcome-logo">
                    🤖
                </div>

                <h1>سلام 👋</h1>

                <p>
                    من Sina AI هستم.
                    <br>
                    هر سوالی داری بپرس.
                </p>

            </div>

        </section>

        <!-- Input -->

        <footer class="inputArea">

            <button id="attach" title="فایل">
                📎
            </button>

            <input
                id="prompt"
                type="text"
                placeholder="پیام خود را بنویس..."
                autocomplete="off"
            >

            <button id="send" title="ارسال">
                ➤
            </button>

        </footer>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
